# Named volumes for DB and LibreNMS data - history and discovered devices
# survive restarts. Docker manages them, no manual backup needed.
# Full wipe: docker compose down -v
#
# Variables are loaded from .env (gitignored).
# Copy .env.example to .env and fill in your values before starting.

services:
  db:
    image: mariadb:latest
    container_name: librenms-db
    restart: unless-stopped
    network_mode: host
    command: ['--innodb-file-per-table=1', '--lower-case-table-names=0', '--collation-server=utf8mb4_unicode_ci']
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:latest
    container_name: librenms-redis
    restart: unless-stopped
    network_mode: host

  librenms:
    build: .
    image: librenms-local:latest
    container_name: librenms
    restart: unless-stopped
    hostname: librenms
    network_mode: host
    dns:
      - ${DNS_SERVER}
    depends_on:
      - db
      - redis
    environment:
      TZ: ${TZ}
      PUID: 1000
      PGID: 1000
      DB_HOST: 127.0.0.1
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_HOST: 127.0.0.1
      APP_URL: ${APP_URL}
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      SNMP_COMMUNITY: ${SNMP_COMMUNITY}
      DISCOVERY_SUBNET: ${DISCOVERY_SUBNET}
      SYSLOG_PURGE_DAYS: ${SYSLOG_PURGE_DAYS}
    volumes:
      - librenms_data:/data
      - ./config.php:/data/config/config.php:ro
      - ./scripts/post/librenms/post_librenms_import_alerts.php:/data/init-scripts/post_librenms_import_alerts.php:ro

  dispatcher:
    build: .
    image: librenms-local:latest
    container_name: librenms-dispatcher
    restart: unless-stopped
    hostname: dispatcher1
    network_mode: host
    dns:
      - ${DNS_SERVER}
    depends_on:
      - librenms
    environment:
      TZ: ${TZ}
      PUID: 1000
      PGID: 1000
      DB_HOST: 127.0.0.1
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_HOST: 127.0.0.1
      APP_URL: ${APP_URL}
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      DISPATCHER_NODE_ID: dispatcher1
      SIDECAR_DISPATCHER: 1
    volumes:
      - librenms_data:/data

  syslogng:
    build: .
    image: librenms-local:latest
    container_name: librenms-syslogng
    restart: unless-stopped
    network_mode: host
    dns:
      - ${DNS_SERVER}
    depends_on:
      - librenms
    environment:
      TZ: ${TZ}
      PUID: 1000
      PGID: 1000
      DB_HOST: 127.0.0.1
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_HOST: 127.0.0.1
      APP_URL: ${APP_URL}
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      SIDECAR_SYSLOGNG: 1
    volumes:
      - librenms_data:/data

  nginx:
    image: nginx:stable-alpine
    container_name: librenms-nginx
    restart: unless-stopped
    network_mode: host
    depends_on:
      - librenms
    environment:
      APP_URL: ${APP_URL}
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf.template:ro
      - ./scripts/pre/nginx/pre_nginx_start.sh:/pre_nginx_start.sh:ro
    entrypoint: ["sh", "/pre_nginx_start.sh"]

  scan:
    image: docker:cli
    container_name: librenms-scan
    restart: "no"
    depends_on:
      - librenms
    environment:
      LNMS_ADMIN_USER: ${LNMS_ADMIN_USER}
      LNMS_ADMIN_PASS: ${LNMS_ADMIN_PASS}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      LNMS_API_TOKEN: ${LNMS_API_TOKEN}
      IMPORT_ALERT_COLLECTION: ${IMPORT_ALERT_COLLECTION:-1}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts:/scripts:ro
    command: ["sh", "/scripts/post/librenms/post_librenms_bootstrap.sh"]

volumes:
  db_data:
  librenms_data:
