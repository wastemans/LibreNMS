---
# Add syslog_forward::host to your Hiera data so all nodes know where to send logs.
# Typically this goes in your "all nodes" layer (all.yaml in your hierarchy).
#
# syslog_forward replaces x_rsyslog entirely. Remove x_rsyslog from Compatible.yaml
# (or wherever it's declared) and add syslog_forward there instead:
#
#   classes:
#     - 'syslog_forward'
#     - ... (other classes)
#
# The module self-contains everything x_rsyslog did (journald config) plus the
# rsyslog forward to LibreNMS. Logrotate is dropped — nothing is written locally.

syslog_forward::host: 'librenms.mydomain.local'
syslog_forward::port: 514
