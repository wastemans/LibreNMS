# Variables are loaded from .env (gitignored) in this directory — Docker Compose
# substitutes ${VAR} here. Each service only receives env vars listed under it.
# See README.md, section "LibreNMS Stack".
#
# Persistent data lives at DATA_DIR (set in .env, default /opt/monitor_stack).
# Use scripts/utility/ helpers to manage the stack lifecycle.
#
# The `scan` service is one-shot (restart: no): bootstrap + lnms scan, then exits.

services:
  db:
    # Tested with:
    # image: mariadb:12.2.2
    image: mariadb:latest
    container_name: librenms-db
    restart: unless-stopped
    network_mode: host
    command: ['--innodb-file-per-table=1', '--lower-case-table-names=0', '--collation-server=utf8mb4_unicode_ci']
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ${DATA_DIR}/db:/var/lib/mysql

  redis:
    # Tested with:
    # image: redis:8.2-alpine
    image: redis:latest
    container_name: librenms-redis
    restart: unless-stopped
    network_mode: host

  librenms:
    build: .
    # Tested with:
    # image: librenms/librenms:1.112.0
    image: librenms-local:latest
    container_name: librenms
    restart: unless-stopped
    hostname: librenms
    network_mode: host
    dns:
      - ${DNS_SERVER}
    depends_on:
      - db
      - redis
    environment:
      TZ: ${TZ}
      PUID: 1000
      PGID: 1000
      DB_HOST: 127.0.0.1
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_HOST: 127.0.0.1
      APP_URL: ${APP_URL}
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis

      SNMP_COMMUNITY: ${SNMP_COMMUNITY}
      DISCOVERY_SUBNET: ${DISCOVERY_SUBNET}
      SYSLOG_PURGE_DAYS: ${SYSLOG_PURGE_DAYS}
    volumes:
      - ${DATA_DIR}/librenms:/data
      - ./config.php:/data/config/config.php:ro
      - ./scripts/post/librenms:/data/init-scripts:ro

  dispatcher:
    build: .
    container_name: librenms-dispatcher
    # Tested with:
    # image: librenms/librenms:1.112.0
    image: librenms-local:latest
    restart: unless-stopped
    hostname: dispatcher1
    network_mode: host
    dns:
      - ${DNS_SERVER}
    depends_on:
      - librenms
    environment:
      TZ: ${TZ}
      PUID: 1000
      PGID: 1000
      DB_HOST: 127.0.0.1
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_HOST: 127.0.0.1
      APP_URL: ${APP_URL}
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      DISPATCHER_NODE_ID: dispatcher1
      SIDECAR_DISPATCHER: 1
    volumes:
      - ${DATA_DIR}/librenms:/data

  syslogng:
    build: .
    # Tested with:
    # image: librenms/librenms:1.112.0
    image: librenms-local:latest
    container_name: librenms-syslogng
    restart: unless-stopped
    network_mode: host
    dns:
      - ${DNS_SERVER}
    depends_on:
      - librenms
    environment:
      TZ: ${TZ}
      PUID: 1000
      PGID: 1000
      DB_HOST: 127.0.0.1
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_HOST: 127.0.0.1
      APP_URL: ${APP_URL}
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      SIDECAR_SYSLOGNG: 1
    volumes:
      - ${DATA_DIR}/librenms:/data

  nginx:
    # Tested with:
    # image: nginx:1.28.0-alpine
    image: nginx:stable-alpine
    container_name: librenms-nginx
    restart: unless-stopped
    network_mode: host
    depends_on:
      - librenms
    environment:
      APP_URL: ${APP_URL}
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf.template:ro
      - ./scripts/pre/nginx/pre_nginx_start.sh:/pre_nginx_start.sh:ro
    entrypoint: ["sh", "/pre_nginx_start.sh"]

  scan:
    # Tested with:
    # image: docker:28-cli
    image: docker:cli
    container_name: librenms-scan
    restart: "no"
    depends_on:
      - db
      - librenms
    environment:
      LNMS_ADMIN_USER: ${LNMS_ADMIN_USER}
      LNMS_ADMIN_PASS: ${LNMS_ADMIN_PASS}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      LNMS_API_TOKEN: ${LNMS_API_TOKEN}
      IMPORT_ALERT_COLLECTION: ${IMPORT_ALERT_COLLECTION:-1}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts:/scripts:ro
    command: ["sh", "/scripts/post/librenms/post_librenms_bootstrap.sh"]

